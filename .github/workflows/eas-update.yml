name: EAS Update (OTA)

on:
  push:
    branches: [main]

jobs:
  update:
    name: OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Publish OTA update
        run: eas update --branch production --platform ios --platform android --message "${{ github.event.head_commit.message }}"
